<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Predicción de Precios de Automóviles</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Sistema de Predicción de Precios de Automóviles</h1>

    <label for="enginesize">Tamaño del motor</label>
    <input type="number" id="enginesize" value="130">

    <label for="curbweight">Peso del vehículo</label>
    <input type="number" id="curbweight" value="2548">

    <label for="horsepower">Caballos de fuerza</label>
    <input type="number" id="horsepower" value="111">

    <label for="carwidth">Ancho del vehículo</label>
    <input type="number" step="0.1" id="carwidth" value="65.5">

    <button onclick="predecir()">Estimar precio</button>

    <h2 id="resultado"></h2>

    <script>
        async function predecir() {

            const datos = {
                enginesize: Number(document.getElementById("enginesize").value),
                curbweight: Number(document.getElementById("curbweight").value),
                horsepower: Number(document.getElementById("horsepower").value),
                carwidth: Number(document.getElementById("carwidth").value),

                cylindernumber_four: 1,
                highwaympg: 27,
                citympg: 21,
                carlength: 176.6,
                drivewheel_rwd: 0,
                drivewheel_fwd: 1,
                wheelbase: 99.8,
                boreratio: 3.47,
                fuelsystem_mpfi: 1,
                fuelsystem_2bbl: 0,
                cylindernumber_six: 0,
                enginetype_ohcv: 0,
                enginetype_ohc: 1,
                enginelocation_rear: 0,
                carbody_hatchback: 0,
                cylindernumber_five: 0
            };

            try {

                const respuesta = await fetch("/predecir", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(datos)
                });

                const resultado = await respuesta.json();

                document.getElementById("resultado").innerHTML =
                    "Precio estimado del automóvil: $" +
                    resultado.precio_estimado.toLocaleString("es-MX", {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });

            } catch (error) {

                document.getElementById("resultado").innerHTML =
                    "Error al realizar la predicción.";

                console.error(error);
            }
        }
    </script>

</body>
</html>
